<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - School Pickup System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .kiosk-mode {
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-900 kiosk-mode">
  <div class="container mx-auto px-4 py-8 max-w-md bg-white shadow rounded-lg mt-8 mb-8">
    <header class="text-center mb-8">
      <h1 class="text-3xl font-bold text-blue-700">Login</h1>
      <p class="mt-2 text-sm text-gray-600">Access the pickup system</p>
    </header>

    <form id="login-form" class="space-y-6">
      <div>
        <label for="login-email" class="block font-medium mb-1">Email Address *</label>
        <input type="email" id="login-email" class="w-full p-2 border border-gray-300 rounded" required />
      </div>

      <div>
        <label for="login-password" class="block font-medium mb-1">Password *</label>
        <input type="password" id="login-password" class="w-full p-2 border border-gray-300 rounded" required />
      </div>

      <div class="flex items-center justify-between">
        <label class="flex items-center space-x-2">
          <input type="checkbox" />
          <span>Remember me</span>
        </label>
        <a href="#" class="text-blue-600 hover:underline text-sm">Forgot password?</a>
      </div>

      <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded shadow">
        Login
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-sm text-gray-600">
        Don't have an account? 
        <a href="signup.html" class="text-blue-600 hover:underline">Sign up here</a>
      </p>
    </div>
  </div>

  <script>
    feather.replace();
    
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      // In a real application, you would validate credentials with a server
      alert('Login successful! Redirecting to main system...');
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
