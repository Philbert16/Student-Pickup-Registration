<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - School Pickup System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .kiosk-mode {
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-900 kiosk-mode">
  <div class="container mx-auto px-4 py-8 max-w-md bg-white shadow rounded-lg mt-8 mb-8">
    <header class="text-center mb-8">
      <h1 class="text-3xl font-bold text-blue-700">Create Account</h1>
      <p class="mt-2 text-sm text-gray-600">Sign up to access the pickup system</p>
    </header>

    <form id="signup-form" class="space-y-6">
      <div>
        <label for="full-name" class="block font-medium mb-1">Institution Name *</label>
        <input type="text" id="full-name" class="w-full p-2 border border-gray-300 rounded" required />
      </div>

      <div>
        <label for="email" class="block font-medium mb-1">Email Address *</label>
        <input type="email" id="email" class="w-full p-2 border border-gray-300 rounded" required />
      </div>

      <div>
        <label for="password" class="block font-medium mb-1">Password *</label>
        <input type="password" id="password" class="w-full p-2 border border-gray-300 rounded" required minlength="6" />
      </div>

      <div>
        <label for="confirm-password" class="block font-medium mb-1">Confirm Password *</label>
        <input type="password" id="confirm-password" class="w-full p-2 border border-gray-300 rounded" required minlength="6" />
      </div>

      <div>
        <label for="phone" class="block font-medium mb-1">Phone Number *</label>
        <input type="tel" id="phone" class="w-full p-2 border border-gray-300 rounded" required />
      </div>

      <div>
        <label for="role" class="block font-medium mb-1">Role *</label>
        <select id="role" class="w-full p-2 border border-gray-300 rounded" required>
          <option value="">-- Select Role --</option>
          <option value="admin">Administrator</option>
        </select>
      </div>

      <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded shadow">
        Create Account
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-sm text-gray-600">
        Already have an account? 
        <a href="login.html" class="text-blue-600 hover:underline">Log in here</a>
      </p>
    </div>
  </div>

  <script>
    feather.replace();
    
    document.getElementById('signup-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const role = document.getElementById('role').value;
      
      if (password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
      }
      
      if (role !== 'admin') {
        alert('Only administrators can create accounts.');
        return;
      }
      
      // In a real application, you would send this data to a server
      alert('Account created successfully! Redirecting to login...');
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
